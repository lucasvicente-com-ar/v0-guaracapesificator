<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Convertidor de monedas PYG · ARS · USD">
  <title>Guaraca Pesificator</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Guaraca">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cyan:    #22d3ee;
      --green:   #34d399;
      --blue:    #60a5fa;
      --bg:      #0d1117;
      --surface: #161b22;
      --border:  rgba(34, 211, 238, 0.15);
      --text:    #e6edf3;
      --muted:   rgba(34, 211, 238, 0.5);
      --subtle:  rgba(230, 237, 243, 0.4);
    }

    .light {
      --cyan:    #0e7490;
      --green:   #059669;
      --blue:    #2563eb;
      --bg:      #f8fafc;
      --surface: #ffffff;
      --border:  rgba(14, 116, 144, 0.2);
      --text:    #0f172a;
      --muted:   rgba(14, 116, 144, 0.6);
      --subtle:  rgba(15, 23, 42, 0.35);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 0 1rem 2rem;
      color: var(--text);
      transition: background 0.3s, color 0.3s;
    }

    .container {
      width: 100%;
      max-width: 380px;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      padding: 1.5rem 0 1.25rem;
      position: relative;
    }

    .header h1 {
      font-family: 'Orbitron', monospace;
      font-size: 1.25rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      color: var(--cyan);
    }

    .header p {
      font-family: 'Orbitron', monospace;
      font-size: 0.52rem;
      letter-spacing: 0.35em;
      color: var(--muted);
      margin-top: 0.3rem;
      text-transform: uppercase;
    }

    .theme-btn {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.4rem;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      transition: border-color 0.2s, color 0.2s;
    }
    .theme-btn:hover { border-color: var(--cyan); color: var(--cyan); }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      position: relative;
    }
    .light .card {
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }

    /* Corner brackets */
    .bracket {
      position: absolute;
      width: 14px;
      height: 14px;
      border-color: var(--cyan);
      border-style: solid;
      opacity: 0.6;
    }
    .bracket-tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; border-radius: 16px 0 0 0; }
    .bracket-tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; border-radius: 0 16px 0 0; }
    .bracket-bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; border-radius: 0 0 0 16px; }
    .bracket-br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; border-radius: 0 0 16px 0; }

    /* ── Fields ── */
    .field { margin-bottom: 1rem; }

    .field-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.45rem;
    }

    .field-label {
      font-family: 'Orbitron', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .refresh-btn {
      background: none;
      border: none;
      color: var(--subtle);
      cursor: pointer;
      padding: 0.2rem;
      display: flex;
      transition: color 0.2s;
    }
    .refresh-btn:hover { color: var(--cyan); }
    .refresh-btn:disabled { opacity: 0.2; cursor: not-allowed; }

    /* ── Inputs ── */
    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 1.75rem;
      font-weight: 300;
      font-family: 'Orbitron', monospace;
      letter-spacing: 0.04em;
      text-align: center;
      height: 3.4rem;
      outline: none;
      padding: 0 0.75rem;
      transition: border-color 0.2s, background 0.2s;
    }
    .light input { background: #f1f5f9; }
    input::placeholder { color: var(--subtle); font-family: 'Inter', sans-serif; font-size: 0.85rem; letter-spacing: 0; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }
    input:focus { border-color: var(--cyan); }

    .field-ars .field-label { color: color-mix(in srgb, var(--green) 70%, transparent); }
    .field-ars input { border-color: color-mix(in srgb, var(--green) 20%, transparent); color: var(--green); }
    .field-ars input:focus { border-color: var(--green); }

    .field-usd .field-label { color: color-mix(in srgb, var(--blue) 70%, transparent); }
    .field-usd input { border-color: color-mix(in srgb, var(--blue) 20%, transparent); color: var(--blue); }
    .field-usd input:focus { border-color: var(--blue); }

    /* ── Dividers ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.1rem 0;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider-text {
      font-family: 'Orbitron', monospace;
      font-size: 0.52rem;
      letter-spacing: 0.3em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* ── Footer ── */
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1.1rem;
      padding-top: 0.9rem;
      border-top: 1px solid var(--border);
    }
    .footer span {
      font-family: 'Orbitron', monospace;
      font-size: 0.5rem;
      letter-spacing: 0.12em;
      color: color-mix(in srgb, var(--muted) 45%, transparent);
    }

    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .spinning { animation: spin 1s linear infinite; }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <h1>GUARACA PESIFICATOR</h1>
      <p>intercambiador galáctico de divisas</p>
      <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">
        <svg id="icon-sun" style="display:none" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
        </svg>
        <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
        </svg>
      </button>
    </div>

    <div class="card">
      <span class="bracket bracket-tl"></span>
      <span class="bracket bracket-tr"></span>
      <span class="bracket bracket-bl"></span>
      <span class="bracket bracket-br"></span>

      <div class="divider" style="margin-top:0">
        <div class="divider-line"></div>
        <span class="divider-text">Cotización</span>
        <div class="divider-line"></div>
      </div>

      <div class="field">
        <div class="field-header">
          <span class="field-label">Guaraníes / USD</span>
          <button class="refresh-btn" id="btn-pyg" onclick="fetchUSDPYG()">
            <svg id="icon-pyg" xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/>
              <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/>
            </svg>
          </button>
        </div>
        <input id="pyg-rate" type="number" inputmode="decimal" placeholder="—"
          oninput="onRateChange('pyg', this.value)" onkeydown="handleNumericInput(event)">
      </div>

      <div class="field">
        <div class="field-header">
          <span class="field-label">Pesos ARS / USD · Blue</span>
          <button class="refresh-btn" id="btn-ars" onclick="fetchDolarBlue()">
            <svg id="icon-ars" xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/>
              <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/>
            </svg>
          </button>
        </div>
        <input id="ars-rate" type="number" inputmode="decimal" placeholder="—"
          oninput="onRateChange('ars', this.value)" onkeydown="handleNumericInput(event)">
      </div>

      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">Convertidor</span>
        <div class="divider-line"></div>
      </div>

      <div class="field">
        <div class="field-header">
          <span class="field-label">Guaraníes · PYG</span>
        </div>
        <input id="pyg-amount" type="text" inputmode="numeric" placeholder="ingrese monto a convertir"
          oninput="handlePygChange(this.value)" onkeydown="handleNumericInput(event)">
      </div>

      <div class="field field-ars">
        <div class="field-header">
          <span class="field-label">Pesos Argentinos · ARS</span>
        </div>
        <input id="ars-amount" type="text" inputmode="decimal" placeholder="0,00"
          oninput="handleArsChange(this.value)" onkeydown="handleNumericInput(event)">
      </div>

      <div class="field field-usd">
        <div class="field-header">
          <span class="field-label">Dólares · USD</span>
        </div>
        <input id="usd-amount" type="text" inputmode="decimal" placeholder="0,00"
          oninput="handleUsdChange(this.value)" onkeydown="handleNumericInput(event)">
      </div>

      <div class="footer">
        <span>LV · made with iA and Brain</span>
        <span id="build-number">v1.0.32</span>
      </div>
    </div>
  </div>

  <script>
    const html = document.documentElement
    if (localStorage.getItem('theme') === 'light') applyLight()

    function applyLight() {
      html.classList.add('light')
      document.getElementById('icon-sun').style.display = 'block'
      document.getElementById('icon-moon').style.display = 'none'
    }
    function applyDark() {
      html.classList.remove('light')
      document.getElementById('icon-sun').style.display = 'none'
      document.getElementById('icon-moon').style.display = 'block'
    }
    function toggleTheme() {
      if (html.classList.contains('light')) { applyDark(); localStorage.setItem('theme', 'dark') }
      else { applyLight(); localStorage.setItem('theme', 'light') }
    }

    const state = {
      pygPerUsd: '', arsPerUsd: '',
      pygAmount: '', arsAmount: '', usdAmount: '',
      lastEditedField: 'pyg', buildNumber: 32
    }

    setInterval(() => {
      document.getElementById('build-number').textContent = `v1.0.${++state.buildNumber}`
    }, 30000)

    const fmt = (n, dec=0) => n.toLocaleString('de-DE', { minimumFractionDigits: dec, maximumFractionDigits: dec })
    const formatPYG = n => fmt(Math.round(n))
    const formatARS = n => fmt(n, 2)
    const formatUSD = n => fmt(n, 2)

    function parseNum(str) {
      return parseFloat(str.replace(/[.,]/g, (m, i, s) => {
        const last = s.lastIndexOf(m)
        return i === last && s.length - i <= 3 ? '.' : ''
      }))
    }

    function setField(id, val) {
      const el = document.getElementById(id)
      if (el && document.activeElement !== el) el.value = val
    }

    function recalculate() {
      const pygRate = parseFloat(state.pygPerUsd)
      const arsRate = parseFloat(state.arsPerUsd)
      if (isNaN(pygRate) || isNaN(arsRate) || pygRate <= 0 || arsRate <= 0) return

      if (state.lastEditedField === 'pyg' && state.pygAmount) {
        const v = parseNum(state.pygAmount)
        if (!isNaN(v) && v > 0) {
          state.arsAmount = formatARS(v * arsRate / pygRate)
          state.usdAmount = formatUSD(v / pygRate)
          setField('ars-amount', state.arsAmount)
          setField('usd-amount', state.usdAmount)
        }
      } else if (state.lastEditedField === 'ars' && state.arsAmount) {
        const v = parseNum(state.arsAmount)
        if (!isNaN(v) && v > 0) {
          state.pygAmount = formatPYG(v * pygRate / arsRate)
          state.usdAmount = formatUSD(v / arsRate)
          setField('pyg-amount', state.pygAmount)
          setField('usd-amount', state.usdAmount)
        }
      } else if (state.lastEditedField === 'usd' && state.usdAmount) {
        const v = parseNum(state.usdAmount)
        if (!isNaN(v) && v > 0) {
          state.pygAmount = formatPYG(v * pygRate)
          state.arsAmount = formatARS(v * arsRate)
          setField('pyg-amount', state.pygAmount)
          setField('ars-amount', state.arsAmount)
        }
      }
    }

    function onRateChange(cur, val) {
      if (cur === 'pyg') state.pygPerUsd = val
      else state.arsPerUsd = val
      recalculate()
    }

    function setLoading(id, on) {
      document.getElementById('btn-' + id).disabled = on
      document.getElementById('icon-' + id).classList.toggle('spinning', on)
    }

    async function fetchDolarBlue() {
      setLoading('ars', true)
      try {
        const d = await fetch('https://dolarapi.com/v1/dolares/blue').then(r => r.json())
        if (d?.venta) { state.arsPerUsd = d.venta.toString(); document.getElementById('ars-rate').value = state.arsPerUsd; recalculate() }
      } catch(e) {} finally { setLoading('ars', false) }
    }

    async function fetchUSDPYG() {
      setLoading('pyg', true)
      try {
        const d = await fetch('https://api.exchangerate-api.com/v4/latest/USD').then(r => r.json())
        if (d?.rates?.PYG) { state.pygPerUsd = Math.round(d.rates.PYG).toString(); document.getElementById('pyg-rate').value = state.pygPerUsd; recalculate() }
      } catch(e) {} finally { setLoading('pyg', false) }
    }

    function handleNumericInput(e) {
      if ([46,8,9,27,13,110,190,188].includes(e.keyCode) ||
          ((e.keyCode===65||e.keyCode===67||e.keyCode===86||e.keyCode===88) && e.ctrlKey) ||
          (e.keyCode>=35 && e.keyCode<=39)) return
      if ((e.shiftKey || e.keyCode<48 || e.keyCode>57) && (e.keyCode<96 || e.keyCode>105)) e.preventDefault()
    }

    function handlePygChange(val) {
      const digits = val.replace(/\D/g, '')
      const formatted = digits ? parseInt(digits, 10).toLocaleString('de-DE') : ''
      state.pygAmount = formatted
      document.getElementById('pyg-amount').value = formatted
      state.lastEditedField = 'pyg'
      if (!digits) { state.arsAmount=''; state.usdAmount=''; setField('ars-amount',''); setField('usd-amount','') }
      else recalculate()
    }

    function handleArsChange(val) {
      const clean = val.replace(/[^\d.,]/g,'')
      state.arsAmount = clean; state.lastEditedField = 'ars'
      if (!clean) { state.pygAmount=''; state.usdAmount=''; setField('pyg-amount',''); setField('usd-amount','') }
      else recalculate()
    }

    function handleUsdChange(val) {
      const clean = val.replace(/[^\d.,]/g,'')
      state.usdAmount = clean; state.lastEditedField = 'usd'
      if (!clean) { state.pygAmount=''; state.arsAmount=''; setField('pyg-amount',''); setField('ars-amount','') }
      else recalculate()
    }

    fetchDolarBlue()
    fetchUSDPYG()

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js')
  </script>
</body>
</html>
